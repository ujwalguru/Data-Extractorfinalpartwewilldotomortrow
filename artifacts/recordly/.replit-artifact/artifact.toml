kind = "web"
previewPath = "/"
title = "Recordly"
version = "1.0.0"
id = "artifacts/recordly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21815

[services.development]
run = "pnpm --filter @workspace/recordly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/recordly", "run", "build" ]
publicDir = "artifacts/recordly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21815"
BASE_PATH = "/"
